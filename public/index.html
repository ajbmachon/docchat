<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocChat</title>
  <link rel="stylesheet" href="/public/css/styles.css">
</head>
<body>
  <header class="topbar">
    <button class="icon-button mobile-only" id="rail-toggle" type="button" aria-label="Toggle atlas rail">☰</button>
    <div class="brand-lockup">
      <div class="brand-mark">DC</div>
      <div>
        <div class="brand-name">DocChat</div>
        <div class="brand-sub" id="repo-name">loading</div>
      </div>
    </div>
    <div class="ticker" id="top-metrics"></div>
    <div class="topbar-actions">
      <button class="tool-button" id="rebuild-atlas" type="button">↻ Atlas</button>
      <button class="tool-button" id="run-audit-top" type="button">Audit</button>
    </div>
  </header>

  <div class="cockpit">
    <aside class="atlas-rail" id="atlas-rail">
      <section class="rail-section">
        <div class="rail-label">Corpus</div>
        <div class="rail-metrics" id="rail-metrics"></div>
      </section>

      <section class="rail-section">
        <div class="rail-label">Source Filter</div>
        <input class="search-input" id="doc-search" type="search" placeholder="Filter markdown">
        <div class="doc-list" id="doc-list"></div>
      </section>
    </aside>

    <main class="workspace">
      <nav class="workspace-tabs" id="workspace-tabs" aria-label="Workspace views">
        <button class="tab-button active" type="button" data-tab="atlas">Atlas</button>
        <button class="tab-button" type="button" data-tab="topics">Topics</button>
        <button class="tab-button" type="button" data-tab="paths">Paths</button>
        <button class="tab-button" type="button" data-tab="audit">Audit</button>
        <button class="tab-button" type="button" data-tab="media">Media</button>
      </nav>

      <section class="workspace-grid">
        <div class="analysis-pane">
          <div class="pane-header">
            <div>
              <div class="eyebrow" id="pane-eyebrow">Atlas</div>
              <h1 id="pane-title">Documentation Atlas</h1>
            </div>
            <div class="pane-actions" id="pane-actions"></div>
          </div>
          <div class="pane-body" id="analysis-body"></div>
        </div>

        <article class="reader-pane">
          <div class="reader-header">
            <div>
              <div class="reader-path" id="reader-path">No document selected</div>
              <div class="reader-meta" id="reader-meta"></div>
            </div>
            <div class="reader-actions">
              <button class="icon-button" id="save-draft" type="button" aria-label="Save draft" title="Save draft" hidden>▣</button>
            </div>
          </div>
          <div class="pinned-path" id="pinned-path" hidden></div>
          <div class="compare-panel" id="compare-panel" hidden></div>
          <div class="content-body" id="content-body"></div>
        </article>
      </section>
    </main>

    <aside class="chat-rail">
      <div class="chat-header">
        <div>
          <div class="rail-label">Guide</div>
          <div class="chat-provider" id="chat-provider">local-guide</div>
        </div>
        <button class="icon-button" id="clear-chat" type="button" aria-label="Clear chat">×</button>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="chat-message assistant">
          <div class="message-content">Drop a question into the atlas. I can open docs, compare overlaps, pin paths, and draft synthesis pages.</div>
        </div>
      </div>
      <div class="action-log" id="action-log"></div>
      <form class="chat-input-bar" id="chat-form">
        <textarea class="chat-input" id="chat-input" placeholder="Ask about the docs" rows="1"></textarea>
        <button class="chat-send" id="chat-send" type="submit" aria-label="Send">↑</button>
      </form>
    </aside>
  </div>

  <script src="/public/js/markdown.js"></script>
  <script src="/public/js/app.js"></script>
  <script src="/public/js/chat.js"></script>
  <script src="/public/js/explore.js"></script>
</body>
</html>
